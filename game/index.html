<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Quest - Fantasy Platformer</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pathfinding@0.4.18/visual/lib/pathfinding-browser.min.js"></script>
</head>
<body>
    <div id="game-wrapper">
        <div id="game-container"></div>
        <div id="loading-screen">
            <h1>CRYSTAL QUEST</h1>
            <p>Loading...</p>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <!-- Game Scripts -->
    <script src="js/utils/Constants.js"></script>
    <script src="js/utils/SoundManager.js"></script>
    <script src="js/utils/SaveSystem.js"></script>
    <script src="js/utils/ParticleFactory.js"></script>
    <script src="js/entities/Player.js"></script>
    <script src="js/entities/Enemy.js"></script>
    <script src="js/entities/Boss.js"></script>
    <script src="js/entities/Collectible.js"></script>
    <script src="js/systems/SpawnSystem.js"></script>
    <script src="js/systems/DifficultyManager.js"></script>
    <script src="js/levels/LevelConfig.js"></script>
    <script src="js/scenes/BootScene.js"></script>
    <script src="js/scenes/MenuScene.js"></script>
    <script src="js/scenes/GameScene.js"></script>
    <script src="js/scenes/UIScene.js"></script>
    <script src="js/scenes/DialogScene.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
