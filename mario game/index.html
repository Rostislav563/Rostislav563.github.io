<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta Mario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell">
    <header class="hud-bar">
      <div class="hud-item">
        <span class="hud-label">SCORE</span>
        <span id="score" class="hud-value">000000</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">COINS</span>
        <span id="coins" class="hud-value">00</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">WORLD</span>
        <span id="world" class="hud-value">1-1</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">TIME</span>
        <span id="time" class="hud-value">400</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">LIVES</span>
        <span id="lives" class="hud-value">3</span>
      </div>
    </header>

    <section class="stage-wrap">
      <canvas id="game" width="960" height="540" aria-label="Platform game stage"></canvas>
      <div id="overlay" class="overlay">
        <h1>Mario</h1>
        <p>Arrow keys or A/D to move, Space/W/Up to jump</p>
        <p>Collect coins, avoid enemies, touch the flag!</p>
        <button id="startBtn">Start Game</button>
      </div>
    </section>

    <section class="touch-controls" aria-label="Touch controls">
      <button id="leftBtn" class="control-btn">LEFT</button>
      <button id="jumpBtn" class="control-btn">JUMP</button>
      <button id="rightBtn" class="control-btn">RIGHT</button>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
